app:
  tz: "Asia/Kolkata"
  logs_dir: "logs"

zerodha:
  api_key: ""
  api_secret: ""
  redirect_url: ""
  post_reset_time_ist: "07:35"

trading:
  mode: "paper"
  universe_csv: "data/universe_full_nse.csv"
  universe_tier: "main"   # main | with_sme | all_eq — rebuild via scripts/build_universe.sh
  ws_watchlist_size: 200  # full universe screened; WS ticks on top-N + positions only
  daily_investment_min: 1500
  daily_investment_max: 2000
  max_rupees_per_trade: 2000
  max_daily_loss_rupees: 2000
  min_score: 0.65
  slippage_bps: 4
  max_positions: 8

filters:
  min_market_cap_cr: 2000
  min_avg_volume_20d: 300000

risk:
  stop_loss_percent: 2.5
  max_daily_loss_percent: 2.0
  take_profit_percent: 4.0
  trailing_stop_percent: 1.2
  max_hold_minutes: 240

storage:
  sqlite_path: "data/trading.db"

strategies:
  enabled:
    - combined_momentum
    - fii_regime
    - gift_gap
    - opening_range
    - affordable_momentum
    - short_term_reversal
    - stop_loss_guard
    - turtle_breakout
    - vwap_reversion
    - pairs_stat_arb
    - quality_momentum
    - insider_cluster
    - bulk_accumulation
    - iv_premium_sell
    - cash_futures_basis
    - expiry_gamma
    - earnings_vol
    - global_risk_beta
    - macro_confluence
    - gift_fii_sync
    - volume_breakout
    - bollinger_squeeze
    - dual_momentum_pro
    - fii_divergence
    - vwap_volume_confirm
    - crude_energy_beta
    - rsi_regime_adaptive
    - adaptive_alpha
    - strategy_lab
    - sector_rotation
    - options_greeks

rl:
  active_version: "ppo_v1"
  model_dir: "models/rl"
  algorithm: "ppo"
  gamma: 0.99
  lr: 0.0003
  reward_drawdown_penalty: 0.5
  train_offline: true

# User-defined strategies — add your own without code changes
custom_strategies:
  - id: custom_gap_fade
    listens: [BAR_CLOSE_5M]
    conditions:
      r3m_lt: -0.008
      rsi_lt: 38
      fii_net_cr_gt: 0
    action: BUY
    rail: MIS
    confidence: 0.64
    reason: gap_fade_custom
